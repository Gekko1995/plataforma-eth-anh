# ============================================================
# CONFIGURACIÓN NGINX CON SEGURIDAD OBLIGATORIA
# Plataforma ETH-ANH 2026
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name tu-dominio.com www.tu-dominio.com;
    
    # Redirigir HTTP a HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tu-dominio.com www.tu-dominio.com;

    # Certificados SSL (usar Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/tu-dominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tu-dominio.com/privkey.pem;
    
    # Configuración SSL moderna
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Root directory
    root /var/www/plataforma-eth-anh/build;
    index index.html;

    # ========================================================
    # 1. SECURITY HEADERS OBLIGATORIOS
    # ========================================================
    
    # Strict-Transport-Security
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # X-Content-Type-Options
    add_header X-Content-Type-Options "nosniff" always;
    
    # X-Frame-Options (SAMEORIGIN para permitir Looker Studio)
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # X-XSS-Protection
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Referrer-Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Permissions-Policy
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    
    # Content-Security-Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://lookerstudio.google.com https://datastudio.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; frame-src 'self' https://lookerstudio.google.com https://datastudio.google.com; connect-src 'self' https://script.google.com https://lookerstudio.google.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; upgrade-insecure-requests;" always;

    # ========================================================
    # 2. CORS CON WHITELIST
    # ========================================================
    
    set $cors_origin "";
    
    # Lista blanca de dominios permitidos
    if ($http_origin ~* (https://tu-dominio\.com|https://www\.tu-dominio\.com)$) {
        set $cors_origin $http_origin;
    }
    
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
    add_header Access-Control-Max-Age 86400 always;
    
    # Manejar OPTIONS (preflight)
    if ($request_method = OPTIONS) {
        return 204;
    }

    # ========================================================
    # 3. CACHE CONTROL
    # ========================================================
    
    # No cachear index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires 0 always;
        try_files $uri $uri/ =404;
    }
    
    # Cachear archivos estáticos por 1 año
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }
    
    # ========================================================
    # 4. REACT ROUTER - CATCH ALL
    # ========================================================
    
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ========================================================
    # 5. GZIP COMPRESSION
    # ========================================================
    
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # ========================================================
    # 6. RATE LIMITING (OPCIONAL)
    # ========================================================
    
    # Definir zona de rate limiting (agregar antes del bloque server)
    # limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    # limit_req zone=general burst=20 nodelay;

    # ========================================================
    # 7. LOGS
    # ========================================================
    
    access_log /var/log/nginx/plataforma-eth-anh-access.log;
    error_log /var/log/nginx/plataforma-eth-anh-error.log;
}
